<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プログラミング言語アンケート</title>
    <style>
        body {
            background-color: #fff0f5;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 500px;
            box-shadow: 0 4px 15px rgba(255,105,135,0.2);
        }
        h1 {
            color: #ff6987;
            text-align: center;
            font-size: 22px;
        }
        label {
            color: #ff6987;
            font-weight: bold;
            display: block;
            margin-top: 20px;
            margin-bottom: 5px;
        }
        .sub-label {
            color: #ffb3c6;
            font-size: 13px;
            margin-top: 5px;
            margin-bottom: 3px;
            display: block;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffb3c6;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 5px;
        }
        button {
            margin-top: 30px;
            width: 100%;
            padding: 12px;
            background-color: #ff6987;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff4d73;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💻 プログラミング言語アンケート 💻</h1>
        <form action="register.php" method="post">

            <label>ニックネーム</label>
            <input type="text" name="nickname" placeholder="例：たろう" required>

            <label>好きなプログラミング言語</label>
            <select name="language">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="TypeScript">TypeScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Ruby">Ruby</option>
                <option value="Java">Java</option>
                <option value="Swift">Swift</option>
                <option value="Kotlin">Kotlin</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="C#">C#</option>
                <option value="Scala">Scala</option>
                <option value="R">R</option>
                <option value="Dart">Dart</option>
                <option value="その他">その他</option>
            </select>
            <span class="sub-label">その他の場合は記述してください</span>
            <input type="text" name="language_free" placeholder="例：Elixir、Haskellなど">
            <span class="sub-label">その理由を教えてください</span>
            <textarea name="language_reason" rows="2" placeholder="例：書きやすくて楽しい！"></textarea>

            <label>経験年数</label>
            <select name="experience">
                <option value="1年未満">1年未満</option>
                <option value="1〜3年">1〜3年</option>
                <option value="3〜5年">3〜5年</option>
                <option value="5年以上">5年以上</option>
            </select>

            <label>どの言語が一番お金になると思いますか？</label>
            <select name="most_profitable">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="TypeScript">TypeScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Ruby">Ruby</option>
                <option value="Java">Java</option>
                <option value="Swift">Swift</option>
                <option value="Kotlin">Kotlin</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="C#">C#</option>
                <option value="その他">その他</option>
            </select>
            <span class="sub-label">その他の場合は記述してください</span>
            <input type="text" name="most_profitable_free" placeholder="言語名を記述してください">
            <span class="sub-label">その理由を教えてください</span>
            <textarea name="most_profitable_reason" rows="2" placeholder="例：AI需要で単価が高い！"></textarea>

            <label>転職に一番有利な言語・スキルは？</label>
            <select name="best_for_job">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="TypeScript">TypeScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Ruby">Ruby</option>
                <option value="Java">Java</option>
                <option value="Swift">Swift</option>
                <option value="Kotlin">Kotlin</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="C#">C#</option>
                <option value="その他">その他</option>
            </select>
            <span class="sub-label">その他の場合は記述してください</span>
            <input type="text" name="best_for_job_free" placeholder="言語名を記述してください">
            <span class="sub-label">その理由を教えてください</span>
            <textarea name="best_for_job_reason" rows="2" placeholder="例：求人数が多い！"></textarea>

            <label>学習コストが低いと思う言語は？</label>
            <select name="easiest">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="TypeScript">TypeScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Ruby">Ruby</option>
                <option value="Java">Java</option>
                <option value="Swift">Swift</option>
                <option value="Kotlin">Kotlin</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="C#">C#</option>
                <option value="その他">その他</option>
            </select>
            <span class="sub-label">その他の場合は記述してください</span>
            <input type="text" name="easiest_free" placeholder="言語名を記述してください">
            <span class="sub-label">その理由を教えてください</span>
            <textarea name="easiest_reason" rows="2" placeholder="例：文法がシンプル！"></textarea>

            <label>主にどの領域で使っていますか？</label>
            <select name="domain">
                <option value="フロントエンド">フロントエンド</option>
                <option value="バックエンド">バックエンド</option>
                <option value="インフラ">インフラ</option>
                <option value="データ分析">データ分析</option>
                <option value="モバイル">モバイル</option>
                <option value="その他">その他</option>
            </select>
            <span class="sub-label">その他の場合は記述してください</span>
            <input type="text" name="domain_free" placeholder="領域を記述してください">
            <span class="sub-label">その理由を教えてください</span>
            <textarea name="domain_reason" rows="2" placeholder="例：フロントが楽しい！"></textarea>

            <label>次に学びたい言語は？</label>
            <select name="next_language">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="TypeScript">TypeScript</option>
                <option value="PHP">PHP</option>
                <option value="Python">Python</option>
                <option value="Ruby">Ruby</option>
                <option value="Java">Java</option>
                <option value="Swift">Swift</option>
                <option value="Kotlin">Kotlin</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="C#">C#</option>
                <option value="その他">その他</option>
            </select>
            <span class="sub-label">その他の場合は記述してください</span>
            <input type="text" name="next_language_free" placeholder="言語名を記述してください">
            <span class="sub-label">その理由を教えてください</span>
            <textarea name="next_language_reason" rows="2" placeholder="例：需要が高まってるから！"></textarea>

            <label>現在プログラミングを使っていますか？</label>
            <select name="using_now">
                <option value="仕事でメインで使っている">仕事でメインで使っている</option>
                <option value="仕事でたまに使っている">仕事でたまに使っている</option>
                <option value="趣味で使っている">趣味で使っている</option>
                <option value="ほとんど使っていない">ほとんど使っていない</option>
            </select>

            <label>一言コメント</label>
            <textarea name="comment" rows="4" placeholder="自由にどうぞ！"></textarea>

            <button type="submit">送信する 💌</button>
        </form>
    </div>
</body>
</html>
